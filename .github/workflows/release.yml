name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2

      - name: Clippy
        run: cargo clippy --workspace -- -D warnings

      - name: Run tests
        run: cargo test --lib

  version-bump:
    name: Version bump
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Bump to next patch version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          MAJOR="${VERSION%%.*}"
          REST="${VERSION#*.}"
          MINOR="${REST%%.*}"
          PATCH="${REST#*.}"
          NEXT_VERSION="${MAJOR}.${MINOR}.$((PATCH + 1))"
          for toml in app/Cargo.toml crates/cf-math/Cargo.toml crates/cf-scene/Cargo.toml crates/cf-render/Cargo.toml crates/cf-test/Cargo.toml; do
            sed -i "s/^version = \".*\"/version = \"${NEXT_VERSION}\"/" "$toml"
          done
          echo "NEXT_VERSION=${NEXT_VERSION}" >> "$GITHUB_ENV"

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/Cargo.toml crates/cf-math/Cargo.toml crates/cf-scene/Cargo.toml crates/cf-render/Cargo.toml crates/cf-test/Cargo.toml
          git commit -m "chore: prepare for next release (${NEXT_VERSION})"
          git push

  build:
    name: Build (${{ matrix.name }})
    needs: test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: linux
            target: x86_64-unknown-linux-gnu
            artifact: cyberflight
            asset_name: cyberflight-linux-x86_64
          - name: windows
            target: x86_64-pc-windows-gnu
            artifact: cyberflight.exe
            asset_name: cyberflight-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install mingw-w64
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: sudo apt-get update && sudo apt-get install -y mingw-w64

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} -p cyberflight

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: target/${{ matrix.target }}/release/${{ matrix.artifact }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4

      - name: Prepare release assets
        run: |
          mkdir -p dist
          cp cyberflight-linux-x86_64/cyberflight dist/cyberflight-linux-x86_64
          cp cyberflight-windows-x86_64.exe/cyberflight.exe dist/cyberflight-windows-x86_64.exe
          chmod +x dist/cyberflight-linux-x86_64

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/cyberflight-windows-x86_64.exe
            dist/cyberflight-linux-x86_64
